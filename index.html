<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .glass {
            backdrop-filter: blur(22px);
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(96, 165, 250, 0.15);
        }
        .glass-light {
            backdrop-filter: blur(22px);
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(96, 165, 250, 0.15);
        }
        body {
            background: radial-gradient(circle at top left, rgba(96, 165, 250, .12), transparent 30%),
                        radial-gradient(circle at center, rgba(99, 102, 241, .10), transparent 40%),
                        radial-gradient(circle at bottom right, rgba(139, 92, 246, .12), transparent 30%),
                        linear-gradient(to bottom right, #eff6ff, #dbeafe, #bfdbfe);
            transition: background 0.5s ease;
        }
        .dark body {
            background: radial-gradient(circle at top left, rgba(96, 165, 250, .18), transparent 30%),
                        radial-gradient(circle at center, rgba(99, 102, 241, .15), transparent 40%),
                        radial-gradient(circle at bottom right, rgba(139, 92, 246, .18), transparent 30%),
                        linear-gradient(to bottom right, #0c0a1a, #0f172a, #1a0f2e);
        }
        * {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, transform 0.3s ease;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #60a5fa; border-radius: 10px; }
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa, #818cf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(96, 165, 250, 0.15);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">
    <div id="toastContainer" class="fixed top-5 right-5 z-50 flex flex-col gap-3"></div>
    <div id="app"></div>
    <script src="main.js"></script>
</body>
</html>
